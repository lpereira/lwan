name: Build openbsd-x86_64

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-debug:
    name: Build debug
    runs-on: openbsd
    steps:
      - uses: actions/checkout@v6
      - name: Prepare build
        run: cmake ${GITHUB_WORKSPACE} -DCMAKE_BUILD_TYPE=Debug -B build -GNinja
      - name: Build
        run: ninja -C build

  build-release:
    name: Build release
    runs-on: openbsd
    steps:
      - uses: actions/checkout@v6
      - name: Prepare build
        run: cmake ${GITHUB_WORKSPACE} -DCMAKE_BUILD_TYPE=Release -B build -GNinja
      - name: Build
        run: ninja -C build
