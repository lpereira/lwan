name: Static Analysis (clang-analyzer)

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Prepare environment
        run: apt update && apt install -y libdeflate-dev git cmake pkg-config libluajit-5.1-dev libsqlite3-dev libmariadb-dev build-essential ninja-build clang-tools
        env:
          DEBIAN_FRONTEND: noninteractive
      - uses: actions/checkout@v6
      - name: Prepare build
        run: cmake ${GITHUB_WORKSPACE} -DCMAKE_BUILD_TYPE=Debug -B build -GNinja
      - name: Build
        run: scan-build -o report ninja -C build
      - uses: actions/upload-artifact@v7
        with:
          name: clang-static-analysis-report
          path: report/
          if-no-files-found: ignore
          retention-days: 30
