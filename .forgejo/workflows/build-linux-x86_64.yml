name: Build linux-x86_64

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build-debug:
    name: Build debug
    runs-on: ubuntu-latest
    steps:
      - name: Prepare environment
        run: apt update && apt install -y libdeflate-dev git cmake pkg-config libluajit-5.1-dev libsqlite3-dev libmariadb-dev build-essential ninja-build
        env:
          DEBIAN_FRONTEND: noninteractive
      - uses: actions/checkout@v6
      - name: Prepare build
        run: cmake ${GITHUB_WORKSPACE} -DCMAKE_BUILD_TYPE=Debug -B build -GNinja
      - name: Build
        run: ninja -C build
  build-release:
    name: Build release
    runs-on: ubuntu-latest
    steps:
      - name: Prepare environment
        run: apt update && apt install -y libdeflate-dev git cmake pkg-config libluajit-5.1-dev libsqlite3-dev libmariadb-dev build-essential ninja-build
        env:
          DEBIAN_FRONTEND: noninteractive
      - uses: actions/checkout@v6
      - name: Prepare build
        run: cmake ${GITHUB_WORKSPACE} -DCMAKE_BUILD_TYPE=Release -B build -GNinja
      - name: Build
        run: ninja -C build
